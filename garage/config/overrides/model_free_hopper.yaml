# @package _group_
env: "Hopper-v3"

p_tremble: 0.01
reset_prob: 0.5
total_env_steps: 1_000_000
eval_frequency: 50_000
expert_dataset_size: 64_000
bc_init_steps: 0
# sampling_schedule: [[0.2, 0.1, 200000], [0.1, 0.001, 1000000]]
# nse1
# sampling_schedule: [[0.5, 0.2, 200000], [0.2, 0.2, 1000000]]
# nse2
# sampling_schedule: [[0.5, 0.5, 200000], [0.5, 0.5, 1000000]]
# nse3
# sampling_schedule: [[0.8, 0.8, 200000], [0.8, 0.5, 1000000]]
# nse4
# sampling_schedule: [[0.2, 0.2, 300000], [0.2, 0.01, 1000000]]
# nse5
# sampling_schedule: [[0.2, 0.2, 300000], [0.2, 0.1, 1000000]]

# nse6
# sampling_schedule: [[0.5, 0.5, 300000], [0.5, 0.2, 1000000]]
# nse7 
# sampling_schedule: [[0.5, 0.5, 300000], [0.5, 0.01, 1000000]]

# nse8
# sampling_schedule: [[0.2, 0.1, 200000], [0.1, 0.01, 1000000]]
# nse9
# sampling_schedule: [[0.2, 0.5, 200000], [0.5, 0.8, 1000000]]
# nsed
# sampling_schedule: [[0.0, 0.0, 1000000]]

# nse10
sampling_schedule: [[0.2, 0.2, 400000], [0.2, 0.01, 1000000]]
# nse11
# sampling_schedule: [[0.2, 0.5, 500000], [0.5, 0.001, 1000000]]
# nse12
# sampling_schedule: [[0.2, 0.2, 600000], [0.2, 0.1, 1000000]]

train_discriminator: true
discriminator:
  lr: 8e-4
  train_every: 10_000
  num_sample_trajectories: 4
  num_update_steps: 1
  batch_size: 4096
  clip_output: false
  ensemble_size: 1  # 1 is equivalent to no ensemble

actor:
  bc_reg: False
  bc_weight: 1.0
  policy: "MlpPolicy"
  policy_kwargs:
    net_arch: [256, 256]
  train_freq: 64
  gradient_steps: 64
  gamma: 0.98
  tau: 0.02